<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法律學術活動彙整</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a18;
    --paper: #f4efe6;
    --accent: #7a1818;
    --muted: #6b6660;
    --border: #d4cfc6;
    --card-bg: #faf7f2;
    --hover: #f0ebe0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 2rem 3rem 1.8rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
  }

  header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    line-height: 1.3;
  }

  header h1 span {
    display: block;
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    font-weight: 400;
    letter-spacing: 0.15em;
    color: #aaa;
    margin-bottom: 0.4rem;
  }

  .header-credit {
    display: block;
    font-size: 0.75rem;
    font-weight: 400;
    color: #999;
    margin-top: 0.3rem;
    letter-spacing: 0.05em;
  }

  .header-credit a {
    color: #b8a080;
    text-decoration: none;
  }

  .header-credit a:hover {
    text-decoration: underline;
  }

  .header-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: #888;
    text-align: right;
    line-height: 1.8;
  }

  /* ── Controls ── */
  .controls {
    padding: 1.2rem 3rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
    align-items: center;
    background: var(--card-bg);
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 0.8rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
    pointer-events: none;
  }

  input[type="text"], select, input[type="date"] {
    background: white;
    border: 1px solid var(--border);
    color: var(--ink);
    padding: 0.5rem 0.85rem;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
    border-radius: 0;
    -webkit-appearance: none;
  }

  .search-wrap input { padding-left: 2.1rem; }

  input:focus, select:focus { border-color: var(--accent); }

  select { cursor: pointer; min-width: 140px; }

  .date-row {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .date-row input { width: 130px; }

  .btn-reset {
    padding: 0.5rem 1.1rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-reset:hover { border-color: var(--ink); color: var(--ink); }

  .btn-fetch {
    padding: 0.5rem 1.1rem;
    background: var(--accent);
    border: 1px solid var(--accent);
    color: white;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-fetch:hover { opacity: 0.85; }


  /* ── Stats ── */
  .stats-bar {
    padding: 0.65rem 3rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .stats-bar b { color: var(--ink); }

  /* ── Table ── */
  .table-wrap {
    padding: 1.5rem 3rem 4rem;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  thead tr {
    border-bottom: 2px solid var(--ink);
  }

  th {
    text-align: left;
    padding: 0.6rem 0.8rem;
    font-family: 'Noto Serif TC', serif;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 0.05em;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }

  th:hover { color: var(--accent); }

  th .sort-icon { font-size: 0.65rem; margin-left: 0.3rem; opacity: 0.4; }
  th.sorted .sort-icon { opacity: 1; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:hover { background: var(--hover); }

  td {
    padding: 0.7rem 0.8rem;
    vertical-align: top;
    line-height: 1.5;
  }

  td.name { font-weight: 500; max-width: 360px; }

  td.school {
    white-space: nowrap;
    font-size: 0.78rem;
    color: var(--muted);
  }

  td.date {
    white-space: nowrap;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
  }

  td.link a {
    color: var(--accent);
    text-decoration: none;
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }

  td.link a:hover { border-bottom-color: var(--accent); }

  /* ── Loading / Empty ── */
  .status {
    padding: 4rem 3rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
  }

  .loading-dots::after {
    content: '';
    animation: dots 1.2s steps(3, end) infinite;
  }

  @keyframes dots {
    0%   { content: ''; }
    33%  { content: '.'; }
    66%  { content: '..'; }
    100% { content: '...'; }
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    header, .controls, .stats-bar, .table-wrap { padding-left: 1.2rem; padding-right: 1.2rem; }
    header { flex-direction: column; align-items: flex-start; }
    .header-meta { text-align: left; }
    th, td { padding: 0.5rem 0.5rem; }
  }
</style>
<style>
/* ===== 登入遮罩層 ===== */
.auth-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  backdrop-filter: blur(4px);
}

.auth-modal {
  background: white;
  border-radius: 12px;
  padding: 40px 32px;
  max-width: 400px;
  width: 90%;
  text-align: center;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
  animation: slideUp 0.4s ease-out;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.auth-modal h2 {
  font-size: 1.5rem;
  margin-bottom: 12px;
  color: #333;
}

.auth-modal p {
  font-size: 0.95rem;
  color: #666;
  margin-bottom: 24px;
  line-height: 1.6;
}

.auth-modal .loading {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: #666;
  margin: 20px 0;
}

.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid #ddd;
  border-top-color: #4285F4;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.google-login-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 12px 24px;
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 0.95rem;
  font-weight: 500;
  color: #333;
  cursor: pointer;
  transition: all 0.3s;
}

.google-login-btn:hover {
  border-color: #4285F4;
  box-shadow: 0 2px 8px rgba(66, 133, 244, 0.2);
  transform: translateY(-1px);
}

.google-login-btn:active {
  transform: translateY(0);
}

.google-login-btn svg {
  width: 20px;
  height: 20px;
}

.auth-modal .error {
  background: #fee;
  color: #c33;
  padding: 12px;
  border-radius: 6px;
  font-size: 0.9rem;
  margin-bottom: 16px;
  display: none;
}

.auth-modal .error.show {
  display: block;
}

.hidden {
  display: none !important;
}
</style>

<!-- 登入遮罩層 HTML -->
<div id="auth-overlay" class="auth-overlay">
  <div class="auth-modal">
    <h2>研討會查詢系統</h2>
    <p id="auth-message">請使用 Google 帳號登入以繼續</p>
    
    <div id="auth-error" class="error"></div>
    
    <div id="auth-content">
      <button class="google-login-btn" onclick="handleGoogleLogin()">
        <svg viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google 帳號登入
      </button>
    </div>

    <div id="auth-loading" class="loading hidden">
      <div class="spinner"></div>
      <span>驗證中...</span>
    </div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
// ===== 權限檢查 + 登入邏輯 =====
const AUTH_CONFIG = {
  GOOGLE_CLIENT_ID: '973721313231-0no4ivldu33he0kts8k51kn4tqd979g7.apps.googleusercontent.com',
  API_CHECK_PERMISSION: 'https://mjib007.zeabur.app/webhook/check-permission',
  SYSTEM_NAME: '研討會查詢'  // 改成跟 Sheet 的欄位名一樣
};

let currentUser = null;

// 初始化 Google 登入
function initGoogleLogin() {
  if (typeof google === 'undefined' || !google.accounts) {
    setTimeout(initGoogleLogin, 300);
    return;
  }
  google.accounts.id.initialize({
    client_id: AUTH_CONFIG.GOOGLE_CLIENT_ID,
    callback: onGoogleCredential,
    auto_select: false
  });
}

// Google 認證回調
function onGoogleCredential(response) {
  const payload = parseJwt(response.credential);
  loginWithProfile({
    googleId: payload.sub,
    displayName: payload.name,
    email: payload.email,
    photoUrl: payload.picture
  });
}

// JWT 解析
function parseJwt(token) {
  const base64Url = token.split('.')[1];
  const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  const jsonPayload = decodeURIComponent(
    atob(base64)
      .split('')
      .map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
      .join('')
  );
  return JSON.parse(jsonPayload);
}

// 手動觸發 Google 登入
function handleGoogleLogin() {
  if (typeof google === 'undefined' || !google.accounts) {
    showAuthError('Google 登入元件載入中，請稍後再試');
    return;
  }

  google.accounts.oauth2.initTokenClient({
    client_id: AUTH_CONFIG.GOOGLE_CLIENT_ID,
    scope: 'profile email',
    callback: async (response) => {
      if (response.access_token) {
        try {
          const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
            headers: { Authorization: 'Bearer ' + response.access_token }
          });
          const profile = await res.json();
          loginWithProfile({
            googleId: profile.sub,
            displayName: profile.name,
            email: profile.email,
            photoUrl: profile.picture
          });
        } catch (error) {
          showAuthError('無法取得帳號資訊，請稍後再試');
        }
      }
    }
  }).requestAccessToken();
}

// 登入並檢查權限
async function loginWithProfile(profile) {
  currentUser = profile;
  sessionStorage.setItem('user', JSON.stringify(currentUser));
  
  // 檢查權限
  await checkPermission(profile.email);
}

// 檢查系統權限
async function checkPermission(email) {
  setAuthLoading(true);
  
  try {
    const res = await fetch(AUTH_CONFIG.API_CHECK_PERMISSION, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: email,
        system: AUTH_CONFIG.SYSTEM_NAME
      })
    });

    const data = await res.json();
    console.log('✅ 權限檢查結果:', data);

    if (!data.success || !data.hasPermission) {
      showAuthError(`您無權限存取「${AUTH_CONFIG.SYSTEM_NAME}」\n\n請聯絡管理員申請權限`);
      sessionStorage.removeItem('user');
      currentUser = null;
      setAuthLoading(false);
      return;
    }

    // 有權限 → 隱藏遮罩層
    hideAuthOverlay();

  } catch (error) {
    console.error('❌ 權限檢查失敗:', error);
    showAuthError('系統錯誤，無法驗證權限\n\n請稍後再試');
    sessionStorage.removeItem('user');
    currentUser = null;
    setAuthLoading(false);
  }
}

// UI 控制函數
function hideAuthOverlay() {
  const overlay = document.getElementById('auth-overlay');
  overlay.style.display = 'none';
  document.body.style.overflow = '';
  loadData();  // ← 加這一行！
}

function showAuthOverlay() {
  const overlay = document.getElementById('auth-overlay');
  overlay.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function showAuthError(message) {
  const errorEl = document.getElementById('auth-error');
  errorEl.textContent = message;
  errorEl.classList.add('show');
  setTimeout(() => {
    errorEl.classList.remove('show');
  }, 5000);
}

function setAuthLoading(loading) {
  document.getElementById('auth-content').classList.toggle('hidden', loading);
  document.getElementById('auth-loading').classList.toggle('hidden', !loading);
}

// 頁面載入時檢查登入狀態
window.addEventListener('load', async () => {
  initGoogleLogin();

  const userSession = sessionStorage.getItem('user');
  
  if (!userSession) {
    // 未登入 → 顯示登入遮罩
    console.log('未登入，顯示登入遮罩');
    showAuthOverlay();
    return;
  }

  // 已登入 → 檢查權限
  currentUser = JSON.parse(userSession);
  console.log('已登入，檢查權限...', currentUser.email);
  await checkPermission(currentUser.email);
});
</script>
</head>
<body>

<header>
  <h1>
    <span>LAW ACADEMIC EVENTS</span>
    法律學術活動彙整
    <small class="header-credit">（<a href="https://www.facebook.com/twlawfdn" target="_blank" rel="noopener">台灣法學基金會</a>執行長錢世傑製作）</small>
  </h1>
  <div class="header-meta" id="headerMeta">載入中...</div>
</header>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="搜尋活動名稱、主辦方…" oninput="applyFilters()">
  </div>
  <select id="schoolSelect" onchange="applyFilters()">
    <option value="">全部學校</option>
  </select>
  <div class="date-row">
    <span>從</span>
    <input type="date" id="dateFrom">
    <span>至</span>
    <input type="date" id="dateTo">
  </div>
  <button class="btn-fetch" onclick="fetchWithDate()">重新查詢</button>
  <button class="btn-reset" onclick="resetFilters()">清除篩選</button>
</div>

<div class="stats-bar">
  <span id="statsText">載入中…</span>
  <span id="updateTime"></span>
</div>

<div id="tableArea">
  <div class="status"><span class="loading-dots">資料載入中</span></div>
</div>

<script>
const WEBHOOK_URL = 'https://mjib007.zeabur.app/webhook/get-law-events';

let allEvents = [];
let sortKey = '日期';
let sortAsc = false;

async function loadData(dateFrom) {
  const user = JSON.parse(sessionStorage.getItem('user') || '{}');
  const email = user.email || 'unknown@example.com';
  
  const payload = {
    email: email,
    dateFrom: dateFrom || null
  };
  
  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    allEvents = data.events || [];

    // 填學校選單
    const schools = data.schools || [...new Set(allEvents.map(e => e.學校).filter(Boolean))].sort();
    const sel = document.getElementById('schoolSelect');
    schools.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      sel.appendChild(opt);
    });

    // 更新時間
    document.getElementById('headerMeta').innerHTML =
      `資料筆數：${data.total || allEvents.length}<br>更新時間：${data.generatedAt || '—'}`;
    document.getElementById('updateTime').textContent = data.generatedAt || '';

    applyFilters();
  } catch (e) {
    document.getElementById('tableArea').innerHTML =
      `<div class="status">⚠️ 無法載入資料：${e.message}</div>`;
    document.getElementById('statsText').textContent = '載入失敗';
    document.getElementById('headerMeta').textContent = '載入失敗';
  }
}

function applyFilters() {
  const kw = document.getElementById('searchInput').value.trim().toLowerCase();
  const school = document.getElementById('schoolSelect').value;
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;

  let result = allEvents.filter(e => {
    if (school && e.學校 !== school) return false;
    if (from && e.日期 && e.日期 < from) return false;
    if (to && e.日期 && e.日期 > to) return false;
    if (kw) {
      const haystack = `${e.活動名稱} ${e.主辦方} ${e.學校}`.toLowerCase();
      if (!haystack.includes(kw)) return false;
    }
    return true;
  });

  // 排序
  result.sort((a, b) => {
    const va = a[sortKey] || '';
    const vb = b[sortKey] || '';
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });

  document.getElementById('statsText').innerHTML =
    `顯示 <b>${result.length}</b> / ${allEvents.length} 筆活動`;

  renderTable(result);
}

function renderTable(events) {
  if (!events.length) {
    document.getElementById('tableArea').innerHTML =
      '<div class="status">沒有符合條件的活動</div>';
    return;
  }

  const cols = [
    { key: '活動名稱', label: '活動名稱' },
    { key: '學校',   label: '學校' },
    { key: '日期',   label: '日期' },
    { key: '時間',   label: '時間' },
    { key: '地點',   label: '地點' },
    { key: '報名方式', label: '報名' },
    { key: '來源網址', label: '連結' },
  ];

  let html = `<div class="table-wrap"><table>
    <thead><tr>`;
  cols.forEach(c => {
    const isSorted = sortKey === c.key;
    const icon = isSorted ? (sortAsc ? '▲' : '▼') : '⇅';
    html += `<th class="${isSorted ? 'sorted' : ''}" onclick="sortBy('${c.key}')">
      ${c.label}<span class="sort-icon">${icon}</span></th>`;
  });
  html += `</tr></thead><tbody>`;

  events.forEach(e => {
    const url = e.來源網址 || '';
    html += `<tr>
      <td class="name">${esc(e.活動名稱 || '—')}</td>
      <td class="school">${esc(e.學校 || e.主辦方 || '—')}</td>
      <td class="date">${esc(e.日期 || '—')}</td>
      <td>${esc(e.時間 || '')}</td>
      <td>${esc(e.地點 || '')}</td>
      <td>${esc(e.報名方式 || '')}</td>
      <td class="link">${url ? `<a href="${url}" target="_blank" rel="noopener">查看 →</a>` : ''}</td>
    </tr>`;
  });

  html += `</tbody></table></div>`;
  document.getElementById('tableArea').innerHTML = html;
}

function sortBy(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = false; }
  applyFilters();
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('schoolSelect').value = '';
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  applyFilters();
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}


function fetchWithDate() {
  const from = document.getElementById('dateFrom').value;
  document.getElementById('tableArea').innerHTML =
    '<div class="status"><span class="loading-dots">資料載入中</span></div>';
  // 清空學校選單（保留第一個「全部學校」）
  const sel = document.getElementById('schoolSelect');
  while (sel.options.length > 1) sel.remove(1);
  allEvents = [];
  loadData(from || null);
}

loadData();
