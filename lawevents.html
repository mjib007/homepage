<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法律學術活動彙整</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a18;
    --paper: #f4efe6;
    --accent: #7a1818;
    --muted: #6b6660;
    --border: #d4cfc6;
    --card-bg: #faf7f2;
    --hover: #f0ebe0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 2rem 3rem 1.8rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
  }

  header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    line-height: 1.3;
  }

  header h1 span {
    display: block;
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    font-weight: 400;
    letter-spacing: 0.15em;
    color: #aaa;
    margin-bottom: 0.4rem;
  }

  .header-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: #888;
    text-align: right;
    line-height: 1.8;
  }

  /* ── Controls ── */
  .controls {
    padding: 1.2rem 3rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
    align-items: center;
    background: var(--card-bg);
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 0.8rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
    pointer-events: none;
  }

  input[type="text"], select, input[type="date"] {
    background: white;
    border: 1px solid var(--border);
    color: var(--ink);
    padding: 0.5rem 0.85rem;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
    border-radius: 0;
    -webkit-appearance: none;
  }

  .search-wrap input { padding-left: 2.1rem; }

  input:focus, select:focus { border-color: var(--accent); }

  select { cursor: pointer; min-width: 140px; }

  .date-row {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .date-row input { width: 160px; }

  .btn-reset {
    padding: 0.5rem 1.1rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-reset:hover { border-color: var(--ink); color: var(--ink); }

  .btn-fetch {
    padding: 0.5rem 1.1rem;
    background: var(--accent);
    border: 1px solid var(--accent);
    color: white;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-fetch:hover { opacity: 0.85; }


  /* ── Stats ── */
  .stats-bar {
    padding: 0.65rem 3rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .stats-bar b { color: var(--ink); }

  /* ── Table ── */
  .table-wrap {
    padding: 1.5rem 3rem 4rem;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  thead tr {
    border-bottom: 2px solid var(--ink);
  }

  th {
    text-align: left;
    padding: 0.6rem 0.8rem;
    font-family: 'Noto Serif TC', serif;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 0.05em;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }

  th:hover { color: var(--accent); }

  th .sort-icon { font-size: 0.65rem; margin-left: 0.3rem; opacity: 0.4; }
  th.sorted .sort-icon { opacity: 1; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:hover { background: var(--hover); }

  td {
    padding: 0.7rem 0.8rem;
    vertical-align: top;
    line-height: 1.5;
  }

  td.name { font-weight: 500; max-width: 360px; }

  td.school {
    white-space: nowrap;
    font-size: 0.78rem;
    color: var(--muted);
  }

  td.date {
    white-space: nowrap;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
  }

  td.link a {
    color: var(--accent);
    text-decoration: none;
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }

  td.link a:hover { border-bottom-color: var(--accent); }

  /* ── Loading / Empty ── */
  .status {
    padding: 4rem 3rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
  }

  .loading-dots::after {
    content: '';
    animation: dots 1.2s steps(3, end) infinite;
  }

  @keyframes dots {
    0%   { content: ''; }
    33%  { content: '.'; }
    66%  { content: '..'; }
    100% { content: '...'; }
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    header, .controls, .stats-bar, .table-wrap { padding-left: 1.2rem; padding-right: 1.2rem; }
    header { flex-direction: column; align-items: flex-start; }
    .header-meta { text-align: left; }
    th, td { padding: 0.5rem 0.5rem; }
  }
</style>
</head>
<body>

<header>
  <h1>
    <span>LAW ACADEMIC EVENTS</span>
    法律學術活動彙整
  </h1>
  <div class="header-meta" id="headerMeta">載入中...</div>
</header>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="搜尋活動名稱、主辦方…" oninput="applyFilters()">
  </div>
  <select id="schoolSelect" onchange="applyFilters()">
    <option value="">全部學校</option>
  </select>
  <div class="date-row">
    <span>從</span>
    <input type="date" id="dateFrom">
    <span>至</span>
    <input type="date" id="dateTo">
  </div>
  <button class="btn-fetch" onclick="fetchWithDate()">重新查詢</button>
  <button class="btn-reset" onclick="resetFilters()">清除篩選</button>
</div>

<div class="stats-bar">
  <span id="statsText">載入中…</span>
  <span id="updateTime"></span>
</div>

<div id="tableArea">
  <div class="status"><span class="loading-dots">資料載入中</span></div>
</div>

<script>
const WEBHOOK_URL = 'https://mjib007.zeabur.app/webhook/get-law-events';

let allEvents = [];
let sortKey = '日期';
let sortAsc = false;

async function loadData(dateFrom) {
  const url = dateFrom ? `${WEBHOOK_URL}?dateFrom=${dateFrom}` : WEBHOOK_URL;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    allEvents = data.events || [];

    // 填學校選單
    const schools = data.schools || [...new Set(allEvents.map(e => e.學校).filter(Boolean))].sort();
    const sel = document.getElementById('schoolSelect');
    schools.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      sel.appendChild(opt);
    });

    // 更新時間
    document.getElementById('headerMeta').innerHTML =
      `資料筆數：${data.total || allEvents.length}<br>更新時間：${data.generatedAt || '—'}`;
    document.getElementById('updateTime').textContent = data.generatedAt || '';

    applyFilters();
  } catch (e) {
    document.getElementById('tableArea').innerHTML =
      `<div class="status">⚠️ 無法載入資料：${e.message}</div>`;
    document.getElementById('statsText').textContent = '載入失敗';
    document.getElementById('headerMeta').textContent = '載入失敗';
  }
}

function applyFilters() {
  const kw = document.getElementById('searchInput').value.trim().toLowerCase();
  const school = document.getElementById('schoolSelect').value;
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;

  let result = allEvents.filter(e => {
    if (school && e.學校 !== school) return false;
    if (from && e.日期 && e.日期 < from) return false;
    if (to && e.日期 && e.日期 > to) return false;
    if (kw) {
      const haystack = `${e.活動名稱} ${e.主辦方} ${e.學校}`.toLowerCase();
      if (!haystack.includes(kw)) return false;
    }
    return true;
  });

  // 排序
  result.sort((a, b) => {
    const va = a[sortKey] || '';
    const vb = b[sortKey] || '';
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });

  document.getElementById('statsText').innerHTML =
    `顯示 <b>${result.length}</b> / ${allEvents.length} 筆活動`;

  renderTable(result);
}

function renderTable(events) {
  if (!events.length) {
    document.getElementById('tableArea').innerHTML =
      '<div class="status">沒有符合條件的活動</div>';
    return;
  }

  const cols = [
    { key: '活動名稱', label: '活動名稱' },
    { key: '學校',   label: '學校' },
    { key: '日期',   label: '日期' },
    { key: '時間',   label: '時間' },
    { key: '地點',   label: '地點' },
    { key: '報名方式', label: '報名' },
    { key: '來源網址', label: '連結' },
  ];

  let html = `<div class="table-wrap"><table>
    <thead><tr>`;
  cols.forEach(c => {
    const isSorted = sortKey === c.key;
    const icon = isSorted ? (sortAsc ? '▲' : '▼') : '⇅';
    html += `<th class="${isSorted ? 'sorted' : ''}" onclick="sortBy('${c.key}')">
      ${c.label}<span class="sort-icon">${icon}</span></th>`;
  });
  html += `</tr></thead><tbody>`;

  events.forEach(e => {
    const url = e.來源網址 || '';
    html += `<tr>
      <td class="name">${esc(e.活動名稱 || '—')}</td>
      <td class="school">${esc(e.學校 || e.主辦方 || '—')}</td>
      <td class="date">${esc(e.日期 || '—')}</td>
      <td>${esc(e.時間 || '')}</td>
      <td>${esc(e.地點 || '')}</td>
      <td>${esc(e.報名方式 || '')}</td>
      <td class="link">${url ? `<a href="${url}" target="_blank" rel="noopener">查看 →</a>` : ''}</td>
    </tr>`;
  });

  html += `</tbody></table></div>`;
  document.getElementById('tableArea').innerHTML = html;
}

function sortBy(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = false; }
  applyFilters();
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('schoolSelect').value = '';
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  applyFilters();
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}


function fetchWithDate() {
  const from = document.getElementById('dateFrom').value;
  document.getElementById('tableArea').innerHTML =
    '<div class="status"><span class="loading-dots">資料載入中</span></div>';
  // 清空學校選單（保留第一個「全部學校」）
  const sel = document.getElementById('schoolSelect');
  while (sel.options.length > 1) sel.remove(1);
  allEvents = [];
  loadData(from || null);
}

loadData();
</script>
</body>
</html>
