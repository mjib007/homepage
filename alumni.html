<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北大資管所友會 — 校友查詢平台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#1a2236;
  --ink-mid:#2d3f5e;
  --ink-light:#4a5f82;
  --gold:#c49a2a;
  --gold-light:#e8c96b;
  --cream:#f7f4ee;
  --cream-mid:#ede9e0;
  --white:#ffffff;
  --border:#d6cfc0;
  --shadow:0 2px 16px rgba(26,34,54,0.10);
}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--cream);
  color:var(--ink);
  min-height:100vh;
}

/* HEADER */
.site-header{
  background:var(--ink);
  color:var(--white);
  padding:28px 24px 22px;
  text-align:center;
  position:relative;
  border-bottom:3px solid var(--gold);
}
.site-header::before{
  content:'';
  position:absolute;
  bottom:-6px;left:0;right:0;
  height:2px;
  background:var(--cream);
}
.site-title{
  font-family:'Noto Serif TC',serif;
  font-size:22px;
  font-weight:700;
  letter-spacing:4px;
  color:var(--white);
  margin-bottom:6px;
}
.site-sub{
  font-size:12px;
  color:var(--gold-light);
  letter-spacing:2px;
  text-transform:uppercase;
}
.header-deco{
  display:flex;align-items:center;justify-content:center;
  gap:10px;margin-bottom:10px;
}
.deco-line{width:40px;height:1px;background:var(--gold);opacity:.6}

/* MAIN */
.container{max-width:520px;margin:0 auto;padding:24px 16px 60px}

/* STATS BAR */
.stats-bar{
  display:flex;gap:0;
  background:var(--ink-mid);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:24px;
}
.stat-item{
  flex:1;
  text-align:center;
  padding:12px 8px;
  border-right:1px solid rgba(255,255,255,.1);
}
.stat-item:last-child{border-right:none}
.stat-num{
  font-family:'Noto Serif TC',serif;
  font-size:22px;font-weight:700;
  color:var(--gold-light);
  display:block;line-height:1;
}
.stat-label{
  font-size:11px;
  color:rgba(255,255,255,.6);
  margin-top:4px;letter-spacing:1px;
}

/* TABS */
.tab-bar{
  display:flex;
  background:var(--white);
  border-radius:10px;
  border:1px solid var(--border);
  overflow:hidden;
  margin-bottom:20px;
  box-shadow:var(--shadow);
}
.tab-btn{
  flex:1;
  padding:12px 8px;
  background:none;border:none;
  font-size:13px;font-weight:500;
  color:var(--ink-light);
  cursor:pointer;
  border-right:1px solid var(--border);
  transition:all .2s;
  letter-spacing:.5px;
  font-family:'Noto Sans TC',sans-serif;
}
.tab-btn:last-child{border-right:none}
.tab-btn.active{
  background:var(--ink);
  color:var(--gold-light);
  font-weight:700;
}
.tab-btn:hover:not(.active){background:var(--cream)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:20px}
.search-input{
  width:100%;
  padding:12px 16px 12px 44px;
  border:1px solid var(--border);
  border-radius:8px;
  font-size:15px;
  font-family:'Noto Sans TC',sans-serif;
  background:var(--white);
  color:var(--ink);
  outline:none;
  transition:border-color .2s;
}
.search-input:focus{border-color:var(--gold)}
.search-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:16px;color:var(--ink-light);pointer-events:none;
}

/* GRID — category cards */
.category-grid{display:grid;gap:12px}
.cat-card{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px 20px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  transition:all .2s;
  box-shadow:var(--shadow);
}
.cat-card:hover{
  border-color:var(--gold);
  transform:translateX(4px);
}
.cat-left{display:flex;align-items:center;gap:14px}
.cat-icon{
  width:40px;height:40px;border-radius:8px;
  background:var(--ink);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.cat-name{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:2px}
.cat-count{font-size:12px;color:var(--ink-light)}
.cat-arrow{font-size:18px;color:var(--border)}

/* DETAIL VIEW */
.detail-view{display:none}
.back-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:none;border:1px solid var(--border);
  border-radius:8px;padding:8px 16px;
  font-size:14px;color:var(--ink-light);
  cursor:pointer;margin-bottom:20px;
  font-family:'Noto Sans TC',sans-serif;
  transition:all .2s;
}
.back-btn:hover{border-color:var(--ink);color:var(--ink)}

.detail-heading{
  font-family:'Noto Serif TC',serif;
  font-size:18px;font-weight:700;
  margin-bottom:4px;color:var(--ink);
}
.detail-sub{
  font-size:13px;color:var(--ink-light);
  margin-bottom:20px;
}

/* MEMBER CARDS */
.member-grid{display:grid;gap:10px}
.member-card{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px 18px;
  box-shadow:var(--shadow);
}
.member-top{
  display:flex;align-items:flex-start;
  justify-content:space-between;gap:12px;
  margin-bottom:10px;
}
.member-avatar{
  width:42px;height:42px;border-radius:50%;
  background:var(--ink);
  display:flex;align-items:center;justify-content:center;
  font-family:'Noto Serif TC',serif;
  font-size:15px;font-weight:700;color:var(--gold-light);
  flex-shrink:0;
}
.member-info{flex:1}
.member-name{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:2px}
.member-org{font-size:13px;color:var(--ink-light)}
.member-title-badge{
  font-size:11px;
  background:var(--cream-mid);
  color:var(--ink-mid);
  padding:3px 8px;border-radius:4px;
  white-space:nowrap;
  flex-shrink:0;margin-top:2px;
}
.member-body{
  border-top:1px solid var(--cream-mid);
  padding-top:10px;
  font-size:13px;color:var(--ink-light);
  line-height:1.6;
}
.member-note{
  font-size:12px;color:var(--ink-light);
  font-style:italic;margin-top:6px;
  line-height:1.6;
}
.member-links{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.member-link{
  display:inline-flex;align-items:center;gap:4px;
  font-size:12px;color:var(--gold);
  text-decoration:none;border:1px solid var(--gold);
  border-radius:4px;padding:3px 8px;
  transition:all .2s;
}
.member-link:hover{background:var(--gold);color:var(--white)}

/* EMPTY / LOADING */
.status-msg{
  text-align:center;padding:40px 20px;
  color:var(--ink-light);font-size:14px;
}
.spinner{
  display:inline-block;width:20px;height:20px;
  border:2px solid var(--border);
  border-top-color:var(--ink);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin-bottom:10px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER */
.footer{
  text-align:center;
  padding:16px;
  font-size:11px;
  color:var(--ink-light);
  letter-spacing:1px;
}
.update-tag{
  display:inline-block;
  background:var(--white);
  border:1px solid var(--border);
  border-radius:20px;
  padding:4px 12px;
  font-size:11px;color:var(--ink-light);
  margin-bottom:20px;
  text-align:center;
  width:100%;
}

@media(min-width:600px){
  .container{padding:32px 24px 60px}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-deco">
    <div class="deco-line"></div>
    <span style="font-size:20px">🎓</span>
    <div class="deco-line"></div>
  </div>
  <div class="site-title">北大資管所友會</div>
  <div class="site-sub">Alumni Directory</div>
</header>

<div class="container">

  <!-- Stats -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-item"><span class="stat-num" id="statTotal">—</span><div class="stat-label">校友總數</div></div>
    <div class="stat-item"><span class="stat-num" id="statCohorts">—</span><div class="stat-label">入學屆數</div></div>
    <div class="stat-item"><span class="stat-num" id="statFields">—</span><div class="stat-label">專業領域</div></div>
  </div>

  <div class="update-tag" id="updateTag">資料載入中...</div>

  <!-- MAIN VIEW -->
  <div class="main-view" id="mainView">

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('cohort',this)">入學年度</button>
      <button class="tab-btn" onclick="switchTab('field',this)">專業領域</button>
      <button class="tab-btn" onclick="switchTab('advisor',this)">指導教授</button>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="搜尋校友姓名、單位…" oninput="handleSearch()">
    </div>

    <!-- Category Grid -->
    <div class="category-grid" id="categoryGrid">
      <div class="status-msg"><div class="spinner"></div><br>載入校友資料中…</div>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div class="detail-view" id="detailView">
    <button class="back-btn" onclick="showMain()">← 返回</button>
    <div class="detail-heading" id="detailHeading"></div>
    <div class="detail-sub" id="detailSub"></div>
    <div class="member-grid" id="memberGrid"></div>
  </div>

  <div class="footer">北大資管所友會 · 情感交流 · 資源互惠 · 經驗傳承</div>
</div>

<script>
const API_URL = 'https://mjib007.zeabur.app/webhook/get-alumni';
// 上方 API_URL 請換成你的 n8n Webhook 網址

let alumniData = [];
let currentTab = 'cohort';
const FIELDS = ['資料分析與智能決策','人工智慧與機器學習應用','軟體工程與應用開發','數位轉型與企業資訊系統','資訊安全與風險管理','資訊基礎架構與雲端營運','數位行銷與電子商務','金融科技與創新服務','資訊專案管理與IT顧問','用戶體驗與互動設計'];
const FIELD_EMOJI = {'資料分析與智能決策':'📊','人工智慧與機器學習應用':'🤖','軟體工程與應用開發':'💻','數位轉型與企業資訊系統':'🏢','資訊安全與風險管理':'🔒','資訊基礎架構與雲端營運':'☁️','數位行銷與電子商務':'📱','金融科技與創新服務':'💳','資訊專案管理與IT顧問':'📋','用戶體驗與互動設計':'🎨'};

async function loadData(){
  try{
    const r = await fetch(API_URL);
    const d = await r.json();
    alumniData = d.attendees || d.alumni || [];
    updateStats();
    renderTab();
    const now = new Date();
    document.getElementById('updateTag').textContent = '最後更新：' + now.toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  }catch(e){
    console.error(e);
    document.getElementById('categoryGrid').innerHTML = '<div class="status-msg">⚠️ 資料載入失敗，請稍後重試</div>';
    document.getElementById('updateTag').textContent = '資料載入失敗';
    loadDemo();
  }
}

function loadDemo(){
  alumniData = [
    {姓名:'王小明',服務單位:'台積電',職稱:'資深工程師',入學年度:'2015',畢業年度:'2017',工作或研究領域:'半導體製造',專業領域:'軟體工程與應用開發',指導教授:'陳教授','LinkedIn / 個人連結':'','備註(讓校友更認識你)':''},
    {姓名:'李美玲',服務單位:'中信銀行',職稱:'數位長',入學年度:'2016',畢業年度:'2018',工作或研究領域:'金融科技',專業領域:'金融科技與創新服務',指導教授:'林教授','LinkedIn / 個人連結':'https://linkedin.com','備註(讓校友更認識你)':'熟悉 Open Banking 架構'},
    {姓名:'張大偉',服務單位:'微軟台灣',職稱:'Solution Architect',入學年度:'2016',畢業年度:'2018',工作或研究領域:'雲端服務',專業領域:'資訊基礎架構與雲端營運',指導教授:'陳教授','LinkedIn / 個人連結':'','備註(讓校友更認識你)':''},
    {姓名:'陳怡君',服務單位:'台大醫院',職稱:'資訊主任',入學年度:'2017',畢業年度:'2019',工作或研究領域:'醫療資訊',專業領域:'數位轉型與企業資訊系統',指導教授:'王教授','LinkedIn / 個人連結':'','備註(讓校友更認識你)':'專注醫療資訊化推動'},
    {姓名:'林俊宏',服務單位:'趨勢科技',職稱:'資安研究員',入學年度:'2018',畢業年度:'2020',工作或研究領域:'資安',專業領域:'資訊安全與風險管理',指導教授:'林教授','LinkedIn / 個人連結':'','備註(讓校友更認識你)':''},
  ];
  updateStats();
  renderTab();
  document.getElementById('updateTag').textContent = '示範資料（尚未連接 API）';
}

function updateStats(){
  document.getElementById('statTotal').textContent = alumniData.length;
  const cohorts = new Set(alumniData.map(a=>a.入學年度||'').filter(Boolean));
  const fields = new Set(alumniData.map(a=>a.專業領域||'').filter(Boolean));
  document.getElementById('statCohorts').textContent = cohorts.size;
  document.getElementById('statFields').textContent = fields.size;
}

function switchTab(tab, btn){
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('searchInput').value='';
  renderTab();
}

function renderTab(filter=''){
  const grid = document.getElementById('categoryGrid');
  const lower = filter.toLowerCase();

  // If searching, show flat member list
  if(lower){
    const results = alumniData.filter(a=>
      (a.姓名||'').toLowerCase().includes(lower)||
      (a.服務單位||'').toLowerCase().includes(lower)||
      (a.職稱||'').toLowerCase().includes(lower)
    );
    if(!results.length){grid.innerHTML='<div class="status-msg">找不到符合的校友</div>';return;}
    grid.innerHTML = results.map(m=>memberCardHTML(m)).join('');
    return;
  }

  let groups = {};
  if(currentTab==='cohort'){
    alumniData.forEach(a=>{
      const key = a.入學年度 ? a.入學年度+'年入學' : '未填寫';
      groups[key]=(groups[key]||[]);groups[key].push(a);
    });
    // sort year descending
    groups = Object.fromEntries(Object.entries(groups).sort((a,b)=>b[0].localeCompare(a[0])));
  } else if(currentTab==='field'){
    alumniData.forEach(a=>{
      const key = a.專業領域||'未填寫';
      groups[key]=(groups[key]||[]);groups[key].push(a);
    });
  } else {
    alumniData.forEach(a=>{
      const key = a.指導教授||'未填寫';
      groups[key]=(groups[key]||[]);groups[key].push(a);
    });
  }

  if(!Object.keys(groups).length){grid.innerHTML='<div class="status-msg">暫無資料</div>';return;}

  const icons = {'cohort':'📅','advisor':'👨‍🏫'};
  grid.innerHTML = Object.entries(groups).map(([name,members])=>{
    const emoji = currentTab==='field' ? (FIELD_EMOJI[name]||'🔖') : icons[currentTab];
    return `<div class="cat-card" onclick="showDetail('${encodeURIComponent(name)}')">
      <div class="cat-left">
        <div class="cat-icon">${emoji}</div>
        <div>
          <div class="cat-name">${name}</div>
          <div class="cat-count">${members.length} 位校友</div>
        </div>
      </div>
      <div class="cat-arrow">›</div>
    </div>`;
  }).join('');
}

function handleSearch(){
  const v = document.getElementById('searchInput').value;
  renderTab(v);
}

function showDetail(encodedName){
  const name = decodeURIComponent(encodedName);
  let members;
  if(currentTab==='cohort') members = alumniData.filter(a=>(a.入學年度 ? a.入學年度+'年入學':'未填寫')===name);
  else if(currentTab==='field') members = alumniData.filter(a=>(a.專業領域||'未填寫')===name);
  else members = alumniData.filter(a=>(a.指導教授||'未填寫')===name);

  document.getElementById('detailHeading').textContent = name;
  document.getElementById('detailSub').textContent = `共 ${members.length} 位校友`;
  document.getElementById('memberGrid').innerHTML = members.map(m=>memberCardHTML(m)).join('');
  document.getElementById('mainView').style.display='none';
  document.getElementById('detailView').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function memberCardHTML(m){
  const name = m.姓名||'—';
  const initials = name.slice(0,2);
  const org = m.服務單位||'';
  const title = m.職稱||'';
  const linkedin = m['LinkedIn / 個人連結']||m['linkedin']||'';
  const email = m.電子郵件||m['email']||'';
  const note = m['備註(讓校友更認識你)']||m['備註']||'';

  const links = [];
  if(linkedin) links.push(`<a class="member-link" href="${linkedin}" target="_blank">🔗 LinkedIn</a>`);
  if(email) links.push(`<a class="member-link" href="mailto:${email}">✉ Email</a>`);

  return `<div class="member-card">
    <div class="member-top">
      <div class="member-avatar">${initials}</div>
      <div class="member-info">
        <div class="member-name">${name}</div>
        <div class="member-org">${org}</div>
      </div>
      ${title?`<div class="member-title-badge">${title}</div>`:''}
    </div>
    ${(links.length||note)?`<div class="member-body">
      ${links.length?`<div class="member-links">${links.join('')}</div>`:''}
      ${note?`<div class="member-note">${note}</div>`:''}
    </div>`:''}
  </div>`;
}

function showMain(){
  document.getElementById('mainView').style.display='block';
  document.getElementById('detailView').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}

document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
