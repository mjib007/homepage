<style>
  :root {
    --navy: #1E2761;
    --navy-dk: #141B49;
    --ice: #CADCFC;
    --teal: #00B4A6;
    --teal-dk: #00857A;

    --card: #FFFFFF;
    --text-dk: #1E293B;
    --text-muted: #64748B;
    --amber: #C9A227;
    --serif: "Noto Serif TC", "Songti TC", "PMingLiU", serif;
    --sans: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text-dk);
    min-height: 100vh;
  }
  .topbar {
    padding: 22px 32px; background: var(--navy); color: white;

  .topbar .title { font-family: var(--serif); font-size: 24px; font-weight: 700; margin-top: 4px; }

  }
  .analog-clock circle.face { fill: var(--navy-dk); stroke: var(--teal); stroke-width: 2.5; }
  .analog-clock .tick { stroke: rgba(255,255,255,0.35); stroke-width: 1.5; }
  .analog-clock .hand { stroke-linecap: round; }
  .analog-clock .hour-hand { stroke: white; stroke-width: 4; }
  .analog-clock .minute-hand { stroke: white; stroke-width: 3; }
  .analog-clock .second-hand { stroke: var(--teal); stroke-width: 1.5; }
  .analog-clock .center-dot { fill: var(--teal); }

  .wrap { max-width: 1300px; margin: 0 auto; padding: 28px 260px 60px 32px; transition: padding 0.3s; }
  body.no-sidebar .wrap { padding-right: 32px; }

  /* Agenda sidebar */
  .agenda-sidebar {
    position: fixed; top: 0; right: 0; height: 100vh; width: 240px;
    background: var(--navy-dk); color: white; padding: 28px 20px;
    display: flex; flex-direction: column; z-index: 50;
    box-shadow: -4px 0 16px rgba(0,0,0,0.12);
    transition: transform 0.3s;
  }
  .agenda-sidebar.hidden { transform: translateX(100%); }
  .agenda-sidebar .agenda-title {
    font-family: var(--serif); font-size: 15px; font-weight: 700; color: var(--teal);
    letter-spacing: 1px; margin-bottom: 18px;
  }
  .agenda-sidebar .agenda-list { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .agenda-item {
    display: flex; align-items: flex-start; gap: 10px; padding: 10px 8px;
    border-radius: 8px; font-size: 13px; line-height: 1.5; color: rgba(255,255,255,0.45);
    transition: background 0.2s, color 0.2s;
  }
  .agenda-item .num {
    width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700;
    flex-shrink: 0; margin-top: 1px;
  }
  .agenda-item.done { color: rgba(255,255,255,0.5); text-decoration: line-through; }
  .agenda-item.done .num { background: var(--teal-dk); }
  .agenda-item.current { background: rgba(0,180,166,0.18); color: white; font-weight: 700; }

  .logout-btn {

</style>

<script>
// ====== 設定區 ======
const N8N_BASE = "https://mjib007.zeabur.app"; // 你的n8n網址，結尾不要加斜線
const CHECKIN_URL = N8N_BASE + "/webhook/director-checkin";
const ATTENDEES_URL = N8N_BASE + "/webhook/director-attendees";

const AUTH_CONFIG = {
  GOOGLE_CLIENT_ID: "973721313231-0no4ivldu33he0kts8k51kn4tqd979g7.apps.googleusercontent.com",
  API_CHECK_PERMISSION: N8N_BASE + "/webhook/check-permission",
  SYSTEM_NAME: "董事會報到系統" // 「會員」工作表中對應的權限欄位名稱
};
// ====================

let currentUser = null;

function initGoogleLogin() {
  if (typeof google === "undefined" || !google.accounts) {
    setTimeout(initGoogleLogin, 300);
    return;
  }
  google.accounts.id.initialize({
    client_id: AUTH_CONFIG.GOOGLE_CLIENT_ID,
    callback: onGoogleCredential,
    auto_select: false
  });
  google.accounts.id.renderButton(
    document.getElementById("googleBtnContainer"),
    { theme: "outline", size: "large", width: 280 }
  );
}

async function onGoogleCredential(response) {
  const payload = parseJwt(response.credential);
  currentUser = { email: payload.email, name: payload.name };
  sessionStorage.setItem("boardUser", JSON.stringify(currentUser));
  await checkPermission(currentUser.email);
}

function parseJwt(token) {
  const base64Url = token.split(".")[1];
  const base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
  const jsonPayload = decodeURIComponent(
    atob(base64).split("").map(c =>
      "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2)
    ).join("")
  );
  return JSON.parse(jsonPayload);
}

async function checkPermission(email) {
  setAuthLoading(true);
  hideAuthError();
  try {
    const res = await fetch(AUTH_CONFIG.API_CHECK_PERMISSION, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, system: AUTH_CONFIG.SYSTEM_NAME })
    });
    const data = await res.json();
    if (data.success && data.hasPermission) {
      document.getElementById("authOverlay").classList.add("hidden");
      startApp(); // 通過驗證才啟動主程式與載入資料
    } else {
      showAuthError(`帳號 ${email} 無「${AUTH_CONFIG.SYSTEM_NAME}」存取權限`);
      sessionStorage.removeItem("boardUser");
      currentUser = null;
    }
  } catch (e) {
    showAuthError("系統驗證失敗，請稍後再試");
    sessionStorage.removeItem("boardUser");
    currentUser = null;
  } finally {
    setAuthLoading(false);
  }
}

function setAuthLoading(show) {
  document.getElementById("authLoading").classList.toggle("hidden", !show);
  document.getElementById("googleBtnContainer").classList.toggle("hidden", show);
}
function showAuthError(msg) {
  const el = document.getElementById("authError");
  el.textContent = msg;
  el.classList.remove("hidden");
}
function hideAuthError() {
  document.getElementById("authError").classList.add("hidden");
}
function handleLogout() {
  sessionStorage.removeItem("boardUser");
  location.reload();
}

];
const AGENDA = [
  "宣讀第1次董事會議紀錄",
  "主席報告",
  "報告事項一：115年度工作報告及經費決算",

// checkins以編號為key：{ D001: "2026-07-17 13:02:15", ... }
// guests為本機列席人員（不寫入Google Sheet）
let state = { checkins: {}, guests: {}, guestOrder: [], quorum: 9, agendaIndex: 0, sidebarHidden: false };
let quorumWasMet = false;
let pendingIds = new Set(); // 傳送中防止連點

function loadLocal() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state.quorum = parsed.quorum || 9;
      state.agendaIndex = parsed.agendaIndex || 0;
      state.sidebarHidden = !!parsed.sidebarHidden;
      state.guests = parsed.guests || {};
      state.guestOrder = parsed.guestOrder || [];
    }
  } catch (e) { /* 忽略 */ }
}

function saveLocal() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      quorum: state.quorum, agendaIndex: state.agendaIndex,
      sidebarHidden: state.sidebarHidden,
      guests: state.guests, guestOrder: state.guestOrder
    }));
  } catch (e) { /* 忽略 */ }
}

function fmtTimeFromSheet(str) {
  // Sheet存的是 "2026-07-17 13:02:15"，取時:分顯示
  if (!str) return "";
  const m = str.match(/(\d{2}):(\d{2}):\d{2}/);
  return m ? `${m[1]}:${m[2]}` : str;
}

function speak(text) {
  try {
    if (!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "zh-TW";
    utter.rate = 0.95;
    utter.pitch = 1;
    window.speechSynthesis.speak(utter);
  } catch (e) { /* 忽略 */ }
}

function celebrateQuorum() {
  document.body.classList.remove("celebrate");
  void document.body.offsetWidth;
  document.body.classList.add("celebrate");
  speak("已達開會法定人數，會議可以正式開始。");
}

function setQuorum(val) {
  const n = Math.max(1, Math.min(17, parseInt(val, 10) || 9));
  state.quorum = n;
  saveLocal();
  render();
}

function setSyncStatus(text, isError) {
  const el = document.getElementById("syncStatus");
  if (!el) return;
  el.textContent = text;
  el.style.color = isError ? "#C0392B" : "var(--text-muted)";
}

// 從Google Sheet載入全部出席狀態
async function loadFromSheet() {
  setSyncStatus("同步中…", false);
  try {
    const res = await fetch(ATTENDEES_URL);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const newCheckins = {};
    (data.directors || []).forEach(d => {
      if (d.出席狀態 === "YES") {
        newCheckins[d.編號] = d.報到時間 || "";
      }
    });
    state.checkins = newCheckins;
    setSyncStatus("已同步 Google Sheet（" + (data.generatedAt || "") + "）", false);
  } catch (e) {
    setSyncStatus("⚠ 無法連線後端，請確認網路與n8n工作流已啟用", true);
  }
  render();
}

// 點選人名：呼叫Webhook切換出席
async function toggle(memberId) {
  const member = MEMBERS.find(m => m.id === memberId);
  if (!member) { toggleGuest(memberId); return; }
  if (pendingIds.has(memberId)) return; // 傳送中，忽略連點
  pendingIds.add(memberId);
  render();

  const isCheckedIn = !!state.checkins[memberId];
  const action = isCheckedIn ? "cancel" : "checkin";
  try {
    const res = await fetch(CHECKIN_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ 編號: memberId, action })
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    if (data.出席狀態 === "YES") {
      state.checkins[memberId] = data.報到時間 || "";
    } else {
      delete state.checkins[memberId];
    }
    setSyncStatus("已寫入 Google Sheet", false);
  } catch (e) {
    setSyncStatus("⚠ 寫入失敗，請重試（確認n8n工作流已啟用）", true);
  }
  pendingIds.delete(memberId);
  render();
}

// 列席人員僅記錄在本機，不寫入Google Sheet
function toggleGuest(name) {
  if (state.guests[name]) {
    delete state.guests[name];
  } else {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, "0");
    const mm = String(now.getMinutes()).padStart(2, "0");
    state.guests[name] = `${hh}:${mm}`;
  }
  saveLocal();
  render();
}

function guestCheckIn() {
  const input = document.getElementById("guestName");
  const name = input.value.trim();
  if (!name) return;
  if (!state.guestOrder.includes(name)) state.guestOrder.push(name);
  if (!state.guests[name]) {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, "0");
    const mm = String(now.getMinutes()).padStart(2, "0");
    state.guests[name] = `${hh}:${mm}`;
  }
  saveLocal();
  input.value = "";
  render();
}

async function resetAll() {
  if (!confirm("確定要清空本次所有出席紀錄嗎？將逐一清除Google Sheet上的出席註記，此動作無法復原。")) return;
  setSyncStatus("清除中，請稍候…", false);
  for (const id of Object.keys(state.checkins)) {
    try {
      await fetch(CHECKIN_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 編號: id, action: "cancel" })
      });
    } catch (e) { /* 個別失敗略過 */ }
  }
  state.checkins = {};
  state.guests = {};
  state.guestOrder = [];
  state.agendaIndex = 0;
  quorumWasMet = false;
  saveLocal();
  setSyncStatus("已清空", false);
  render();
}

function removeGuest(name) {
  delete state.guests[name];
  state.guestOrder = state.guestOrder.filter(n => n !== name);
  saveLocal();
  render();
}

function toggleSidebar() {
  state.sidebarHidden = !state.sidebarHidden;
  saveLocal();
  renderSidebar();
}

function agendaStep(delta) {
  const next = state.agendaIndex + delta;
  if (next < 0 || next >= AGENDA.length) return;
  state.agendaIndex = next;
  saveLocal();
  renderAgenda();
}

function renderSidebar() {
  const panel = document.getElementById("agendaSidebar");
  const toggleBtn = document.getElementById("sidebarToggle");
  if (state.sidebarHidden) {
    panel.classList.add("hidden");
    document.body.classList.add("no-sidebar");
    toggleBtn.classList.remove("sidebar-open");
    toggleBtn.textContent = "☰";
    toggleBtn.title = "顯示議程進度";
  } else {
    panel.classList.remove("hidden");
    document.body.classList.remove("no-sidebar");
    toggleBtn.classList.add("sidebar-open");
    toggleBtn.textContent = "✕";
    toggleBtn.title = "隱藏議程進度";
  }
}

function renderAgenda() {
  const list = document.getElementById("agendaList");
  list.innerHTML = "";
  AGENDA.forEach((text, i) => {
    const row = document.createElement("div");
    let cls = "agenda-item";
    if (i < state.agendaIndex) cls += " done";
    if (i === state.agendaIndex) cls += " current";
    row.className = cls;
    row.innerHTML = `<span class="num">${i + 1}</span><span>${text}</span>`;
    list.appendChild(row);
  });
  document.getElementById("agendaPrev").disabled = state.agendaIndex <= 0;
  document.getElementById("agendaNext").disabled = state.agendaIndex >= AGENDA.length - 1;
}

function render() {
  document.getElementById("quorumInput").value = state.quorum;

  const grid = document.getElementById("cardGrid");
  grid.innerHTML = "";
  const allEntries = [
    ...MEMBERS.map(m => ({ ...m, isGuest: false })),
    ...state.guestOrder.map(n => ({ id: n, name: n, role: "列席人員（僅本機）", isGuest: true }))
  ];
  allEntries.forEach(m => {
    const timeVal = m.isGuest ? state.guests[m.name] : state.checkins[m.id];
    const done = !!timeVal;
    const isPending = pendingIds.has(m.id);
    const card = document.createElement("button");
    card.className = "card" + (done ? " done" : "");
    card.setAttribute("aria-pressed", done ? "true" : "false");
    card.disabled = isPending;
    card.onclick = () => toggle(m.id);
    const displayTime = m.isGuest ? timeVal : fmtTimeFromSheet(timeVal);
    card.innerHTML = `
      ${m.isGuest ? '<span class="delete-btn" title="移除此人員" role="button" tabindex="0">✕</span>' : ''}
      ${done ? '<div class="checkmark">✓</div>' : ''}
      <div class="role">${m.role}</div>
      <div class="name">${m.name}</div>
      <div class="status">${isPending ? "傳送中…" : (done ? "已出席 " + displayTime : "點選確認出席")}</div>
    `;
    if (m.isGuest) {
      const delBtn = card.querySelector(".delete-btn");
      delBtn.addEventListener("click", (ev) => {
        ev.stopPropagation();
        removeGuest(m.name);
      });
      delBtn.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter" || ev.key === " ") {
          ev.preventDefault();
          ev.stopPropagation();
          removeGuest(m.name);
        }
      });
    }
    grid.appendChild(card);
  });

  // 出席人數僅計算董事（Google Sheet來源），列席人員不列入法定人數
  const count = Object.keys(state.checkins).length;
  document.getElementById("checkedCount").textContent = count;

  const pct = Math.min(1, count / state.quorum);
  const offset = CIRC * (1 - pct);
  const arc = document.getElementById("gaugeArc");
  arc.setAttribute("stroke-dashoffset", offset);
  arc.setAttribute("stroke", count >= state.quorum ? "#00B4A6" : "#C9A227");

  const tag = document.getElementById("quorumTag");
  const isMet = count >= state.quorum;
  if (isMet) {
    tag.textContent = "已達開會人數";
    tag.className = "quorum-tag met";
  } else {
    tag.textContent = `尚差 ${state.quorum - count} 人達開會人數`;
    tag.className = "quorum-tag not-met";
  }

  if (isMet && !quorumWasMet) {
    celebrateQuorum();
  }
  quorumWasMet = isMet;

  renderAgenda();
  renderSidebar();
}

function updateClock() {
  const now = new Date();
  const weekday = ["日", "一", "二", "三", "四", "五", "六"][now.getDay()];
  const y = now.getFullYear(), m = now.getMonth() + 1, d = now.getDate();
  const hours = now.getHours(), mins = now.getMinutes(), secs = now.getSeconds();
  const hh = String(hours).padStart(2, "0");
  const mm = String(mins).padStart(2, "0");
  const ss = String(secs).padStart(2, "0");
  document.getElementById("liveClock").textContent = `${y}/${m}/${d}（週${weekday}） ${hh}:${mm}:${ss}`;

  const secDeg = secs * 6;
  const minDeg = mins * 6 + secs * 0.1;
  const hourDeg = (hours % 12) * 30 + mins * 0.5;
  document.getElementById("secondHand").setAttribute("transform", `rotate(${secDeg} 50 50)`);
  document.getElementById("minuteHand").setAttribute("transform", `rotate(${minDeg} 50 50)`);
  document.getElementById("hourHand").setAttribute("transform", `rotate(${hourDeg} 50 50)`);
}

function startApp() {
  loadLocal();
  render();
  loadFromSheet();
}

window.addEventListener("load", async () => {
  updateClock();
  setInterval(updateClock, 1000);
  initGoogleLogin();
  const session = sessionStorage.getItem("boardUser");
  if (session) {
    currentUser = JSON.parse(session);
    await checkPermission(currentUser.email);
  }
});
</script>
