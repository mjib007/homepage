<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福爾摩斯 — 全球疾病監控</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
  :root {
    --bg:#080c14;--panel:#0d1520;--border:#1a2d45;--accent:#00c8ff;
    --red:#ff4444;--yellow:#ffc107;--green:#44ff88;--orange:#ff8c00;
    --text:#c8d8e8;--text-dim:#5a7a9a;
    --mono:'Share Tech Mono',monospace;--sans:'Noto Sans TC',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

  header{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100;}
  .logo{display:flex;align-items:center;gap:12px;}
  .logo-icon{width:32px;height:32px;border:2px solid var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 12px rgba(255,68,68,0.4);}
  .logo-text{font-family:var(--mono);font-size:14px;color:var(--red);letter-spacing:2px;}
  .logo-sub{font-size:11px;color:var(--text-dim);letter-spacing:1px;margin-top:2px;}
  .header-center{font-family:var(--mono);font-size:12px;color:var(--text-dim);}
  .header-right{display:flex;align-items:center;gap:16px;}
  .clock{font-family:var(--mono);font-size:13px;color:var(--accent);}
  .dot-live{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--red);}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red);animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

  .main{display:flex;flex:1;overflow:hidden;}
  #globe-container{flex:1;position:relative;overflow:hidden;}
  #globe{width:100%;height:100%;}

  /* 左側覆蓋面板 */
  .top-left{position:absolute;top:16px;left:16px;z-index:50;display:flex;flex-direction:column;gap:8px;}
  .mini-card{background:rgba(13,21,32,0.9);border:1px solid var(--border);border-radius:6px;padding:10px 14px;backdrop-filter:blur(6px);min-width:175px;}
  .mini-label{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:1.5px;margin-bottom:4px;}
  .mini-value{font-family:var(--mono);font-size:13px;color:var(--accent);}
  .mini-value.red{color:var(--red);}
  .mini-value.orange{color:var(--orange);}

  /* 圖例 */
  .legend{position:absolute;bottom:24px;left:16px;background:rgba(13,21,32,0.9);border:1px solid var(--border);border-radius:8px;padding:14px 16px;z-index:50;backdrop-filter:blur(6px);}
  .legend-title{font-family:var(--mono);font-size:9px;color:var(--red);letter-spacing:2px;margin-bottom:10px;}
  .legend-bar{width:180px;height:10px;border-radius:5px;background:linear-gradient(to right,#0000ff44,#00cc4488,#ffff0099,#ff8c00cc,#ff0000);margin-bottom:5px;}
  .legend-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--text-dim);margin-bottom:12px;}
  .legend-items{display:flex;flex-direction:column;gap:5px;}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--text-dim);}
  .legend-dot{width:10px;height:10px;border-radius:50%;}

  /* 詳情彈窗 */
  .detail-popup{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(13,21,32,0.96);border:1px solid var(--red);border-radius:8px;padding:14px 18px;z-index:60;min-width:380px;display:none;backdrop-filter:blur(8px);box-shadow:0 0 24px rgba(255,68,68,0.2);}
  .detail-popup.show{display:block;}
  .dp-close{position:absolute;top:8px;right:12px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:15px;}
  .dp-tag{font-family:var(--mono);font-size:9px;color:var(--red);letter-spacing:1px;margin-bottom:6px;}
  .dp-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:10px;}
  .dp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;}
  .dp-lbl{font-size:9px;color:var(--text-dim);font-family:var(--mono);letter-spacing:0.5px;margin-bottom:2px;}
  .dp-val{font-size:12px;color:var(--text);}
  .dp-desc{font-size:11px;color:var(--text-dim);border-top:1px solid var(--border);padding-top:8px;line-height:1.6;}

  /* 右側面板 */
  .side-panel{width:300px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .panel-section{border-bottom:1px solid var(--border);padding:14px 16px;}
  .panel-title{font-family:var(--mono);font-size:10px;color:var(--red);letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .panel-title::after{content:'';flex:1;height:1px;background:var(--border);}
  .stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .stat-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center;}
  .stat-num{font-family:var(--mono);font-size:20px;font-weight:bold;margin-bottom:3px;}
  .stat-lbl{font-size:10px;color:var(--text-dim);}
  .c-red{color:var(--red);}.c-orange{color:var(--orange);}.c-yellow{color:var(--yellow);}.c-green{color:var(--green);}
  .region-list{flex:1;overflow-y:auto;padding:10px 16px;}
  .region-list::-webkit-scrollbar{width:3px;}
  .region-list::-webkit-scrollbar-thumb{background:var(--border);}
  .region-item{padding:10px 12px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
  .region-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
  .region-item.critical::before{background:var(--red);}
  .region-item.high::before{background:var(--orange);}
  .region-item:hover{background:rgba(255,68,68,0.05);border-color:rgba(255,68,68,0.3);}
  .region-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .region-name{font-size:12px;font-weight:500;color:var(--text);}
  .region-badge{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:2px;}
  .region-badge.critical{background:rgba(255,68,68,0.2);color:var(--red);}
  .region-badge.high{background:rgba(255,140,0,0.2);color:var(--orange);}
  .region-meta{display:flex;justify-content:space-between;}
  .region-cases{font-family:var(--mono);font-size:10px;color:var(--text-dim);}
  .trend-up{color:var(--red);font-family:var(--mono);font-size:10px;}
  .trend-down{color:var(--green);font-family:var(--mono);font-size:10px;}
  .trend-flat{color:var(--text-dim);font-family:var(--mono);font-size:10px;}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🦠</div>
    <div>
      <div class="logo-text">HOLMES & WATSON</div>
      <div class="logo-sub">全球疾病監控系統 · DISEASE SURVEILLANCE</div>
    </div>
  </div>
  <div class="header-center" id="utc-clock">UTC —</div>
  <div class="header-right">
    <div class="dot-live"><div class="dot"></div>即時監控中</div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</header>

<div class="main">
  <div id="globe-container">
    <div id="globe"></div>

    <div class="top-left">
      <div class="mini-card">
        <div class="mini-label">監控疾病</div>
        <div class="mini-value">H5N1 禽流感</div>
      </div>
      <div class="mini-card">
        <div class="mini-label">全球確診（模擬）</div>
        <div class="mini-value red">142,780 例</div>
      </div>
      <div class="mini-card">
        <div class="mini-label">極高風險地區</div>
        <div class="mini-value orange">7 區</div>
      </div>
      <div class="mini-card">
        <div class="mini-label">資料更新</div>
        <div class="mini-value" style="font-size:11px;" id="update-time">— 模擬資料 —</div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-title">🌡️ 疾病活躍度</div>
      <div class="legend-bar"></div>
      <div class="legend-labels"><span>極低</span><span>低</span><span>中</span><span>高</span><span>極高</span></div>
      <div class="legend-items">
        <div class="legend-item"><div class="legend-dot" style="background:var(--red);box-shadow:0 0 4px var(--red);"></div>極高風險（爆發中）</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--orange);"></div>高風險（擴散中）</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--yellow);"></div>中風險（持續監控）</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--green);"></div>低風險（零星案例）</div>
      </div>
    </div>

    <div class="detail-popup" id="detail-popup">
      <button class="dp-close" onclick="closeDetail()">✕</button>
      <div class="dp-tag" id="dp-tag"></div>
      <div class="dp-title" id="dp-title"></div>
      <div class="dp-grid">
        <div><div class="dp-lbl">確診案例</div><div class="dp-val" id="dp-cases"></div></div>
        <div><div class="dp-lbl">死亡案例</div><div class="dp-val" id="dp-deaths"></div></div>
        <div><div class="dp-lbl">致死率</div><div class="dp-val" id="dp-rate"></div></div>
        <div><div class="dp-lbl">趨勢</div><div class="dp-val" id="dp-trend"></div></div>
        <div><div class="dp-lbl">首例日期</div><div class="dp-val" id="dp-first"></div></div>
        <div><div class="dp-lbl">風險等級</div><div class="dp-val" id="dp-level"></div></div>
      </div>
      <div class="dp-desc" id="dp-desc"></div>
    </div>
  </div>

  <div class="side-panel">
    <div class="panel-section">
      <div class="panel-title">全球統計</div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-num c-red">7</div><div class="stat-lbl">極高風險</div></div>
        <div class="stat-card"><div class="stat-num c-orange">9</div><div class="stat-lbl">高風險</div></div>
        <div class="stat-card"><div class="stat-num c-yellow">11</div><div class="stat-lbl">中風險</div></div>
        <div class="stat-card"><div class="stat-num c-green">8</div><div class="stat-lbl">低風險</div></div>
      </div>
    </div>
    <div class="panel-section" style="padding:10px 16px 0;">
      <div class="panel-title">高風險地區</div>
    </div>
    <div class="region-list" id="region-list"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// 模擬資料區塊
// 未來替換真實資料庫時，只需更新此區塊
// ══════════════════════════════════════════

  { lat:-36.9, lng:174.8, weight:0.10, region:'奧克蘭',     level:'low',     cases:28,    deaths:1,   trend:'down', firstCase:'2026-02-14', desc:'紐西蘭地理隔離有效，案例數量極少。' },

const LEVEL_LABEL = { critical:'極高風險', high:'高風險', medium:'中風險', low:'低風險' };
const LEVEL_COLOR = { critical:'#ff4444', high:'#ff8c00', medium:'#ffc107', low:'#44ff88' };
const TREND_HTML  = { up:'<span class="trend-up">▲ 上升</span>', down:'<span class="trend-down">▼ 下降</span>', flat:'<span class="trend-flat">▶ 持平</span>' };

// ══════════════════════════════════════════
// 初始化 ECharts GL 地球
// ══════════════════════════════════════════
function initGlobe() {
  const chart = echarts.init(document.getElementById('globe'));

  // 熱力圖資料格式：[lng, lat, weight]
  const heatData = DISEASE_DATA.map(d => [d.lng, d.lat, d.weight]);

  // 散點資料（用於點擊互動）
  const scatterData = DISEASE_DATA.map(d => ({
    name: d.region,
    value: [d.lng, d.lat, d.weight * 100],
    itemStyle: { color: LEVEL_COLOR[d.level] },
    data: d
  }));

  const option = {
    backgroundColor: '#04081c',
    globe: {
      baseTexture: 'https://unpkg.com/echarts-gl/examples/assets/world.topo.bathy.200401.jpg',
      heightTexture: 'https://unpkg.com/echarts-gl/examples/assets/bathymetry_bw_composite_4k.jpg',
      displacementScale: 0.05,
      shading: 'realistic',
      environment: 'auto',
      realisticMaterial: {
        roughness: 0.9,
        metalness: 0
      },
      postEffect: {
        enable: true,
        bloom: { enable: true, bloomIntensity: 0.1 }
      },
      light: {
        main: { intensity: 5, shadow: false },
        ambient: { intensity: 0.3 },
        ambientCubemap: {
          exposure: 1,
          diffuseIntensity: 0.5
        }
      },
      viewControl: {
        autoRotate: true,
        autoRotateSpeed: 5,
        rotateSensitivity: 1,
        zoomSensitivity: 1,
        beta: 0,
        alpha: 20,
        distance: 180
      },
      layers: [{
        type: 'blend',
        blendTo: 'emission',
        texture: 'https://unpkg.com/echarts-gl/examples/assets/starfield.jpg'
      }]
    },
    series: [
      // 熱力圖層（核心視覺）
      {
        type: 'heatmap',
        coordinateSystem: 'globe',
        data: heatData,
        pointSize: 18,
        blurSize: 18,
        minOpacity: 0.1,
        maxOpacity: 0.9,
      },
      // 散點層（點擊互動）
      {
        type: 'scatter3D',
        coordinateSystem: 'globe',
        data: scatterData,
        symbolSize: function(val) {
          return val[2] * 0.12 + 3;
        },
        itemStyle: {
          opacity: 0.85
        },
        label: { show: false },
        emphasis: {
          label: { show: false },
          itemStyle: { opacity: 1 }
        }
      }
    ],
    visualMap: {
      show: false,
      min: 0,
      max: 1,
      inRange: {
        color: [
          '#0000ff',
          '#0044ff',
          '#0088ff',
          '#00ccff',
          '#00ff88',
          '#44ff00',
          '#aaff00',
          '#ffff00',
          '#ffaa00',
          '#ff6600',
          '#ff2200',
          '#ff0000'
        ]
      },
      seriesIndex: 0
    }
  };

  chart.setOption(option);

  // 點擊事件
  chart.on('click', function(params) {
    if (params.seriesIndex === 1 && params.data && params.data.data) {
      showDetail(params.data.data);
    }
  });

  window.addEventListener('resize', () => chart.resize());
}

// 詳情彈窗
function showDetail(d) {
  document.getElementById('dp-tag').textContent = 'H5N1 禽流感 · ' + d.region;
  document.getElementById('dp-title').textContent = d.region + ' — ' + LEVEL_LABEL[d.level] + '疫區';
  document.getElementById('dp-cases').textContent = d.cases.toLocaleString() + ' 例';
  document.getElementById('dp-deaths').innerHTML = `<span style="color:#ff4444">${d.deaths.toLocaleString()} 例</span>`;
  document.getElementById('dp-rate').innerHTML = `<span style="color:#ff8c00">${(d.deaths/d.cases*100).toFixed(1)}%</span>`;
  const trendColor = d.trend === 'up' ? '#ff4444' : d.trend === 'down' ? '#44ff88' : '#5a7a9a';
  const trendText  = d.trend === 'up' ? '▲ 持續上升' : d.trend === 'down' ? '▼ 趨勢下降' : '▶ 持平穩定';
  document.getElementById('dp-trend').innerHTML = `<span style="color:${trendColor}">${trendText}</span>`;
  document.getElementById('dp-first').textContent = d.firstCase;
  document.getElementById('dp-level').innerHTML = `<span style="color:${LEVEL_COLOR[d.level]}">${LEVEL_LABEL[d.level]}</span>`;
  document.getElementById('dp-desc').textContent = d.desc;
  document.getElementById('detail-popup').classList.add('show');
}

function closeDetail() {
  document.getElementById('detail-popup').classList.remove('show');
}

// 右側列表
function renderList() {
  const sorted = [...DISEASE_DATA]
    .filter(d => d.level === 'critical' || d.level === 'high')
    .sort((a, b) => b.weight - a.weight);

  document.getElementById('region-list').innerHTML = sorted.map(d => `
    <div class="region-item ${d.level}" onclick='showDetail(${JSON.stringify(d)})'>
      <div class="region-header">
        <span class="region-name">${d.region}</span>
        <span class="region-badge ${d.level}">${LEVEL_LABEL[d.level]}</span>
      </div>
      <div class="region-meta">
        <span class="region-cases">確診 ${d.cases.toLocaleString()} 例</span>
        ${TREND_HTML[d.trend]}
      </div>
    </div>
  `).join('');
}

// 時鐘
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('zh-TW');
  document.getElementById('utc-clock').textContent = 'UTC ' + now.toUTCString().split(' ')[4];
  document.getElementById('update-time').textContent = '模擬資料 · ' + now.toLocaleDateString('zh-TW');
}
setInterval(updateClock, 1000);
updateClock();

renderList();
window.addEventListener('load', initGlobe);
</script>
</body>
</html>
