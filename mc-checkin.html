<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎪 活動報到系統 - 主控台</title>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --primary-light: #16213e;
            --accent: #e94560;
            --accent-light: #f39c12;
            --success: #27ae60;
            --warning: #f39c12;
            --error: #e74c3c;
            --surface: #0f0f23;
            --surface-light: #16213e;
            --text: #ffffff;
            --text-muted: #bdc3c7;
            --border: #34495e;
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            --scan-gradient: linear-gradient(45deg, #ff006e, #8338ec, #3a86ff);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--surface);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: var(--gradient);
            opacity: 0.1;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.3) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .main-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .scan-section {
            background: var(--surface-light);
            border-radius: 24px;
            padding: 40px;
            border: 2px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .scan-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: var(--scan-gradient);
            opacity: 0.05;
            transform: rotate(45deg);
            z-index: 0;
        }

        .scan-header {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-bottom: 20px;
        }

        .scan-title {
            font-size: 2rem;
            font-weight: 900;
            background: var(--scan-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .scan-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .immediate-result {
            margin: 15px 0;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .immediate-result .result {
            transform: scale(1.1);
            max-width: 500px;
            width: 100%;
        }

        .immediate-result .loading {
            margin: 0;
        }

        #qr-reader {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 4px solid transparent;
            background-image: var(--scan-gradient);
            background-origin: border-box;
            background-clip: padding-box, border-box;
        }

        #qr-reader video {
            width: 100% !important;
            height: 400px !important;
            object-fit: cover;
            border-radius: 16px;
        }

        #qr-reader canvas {
            width: 100% !important;
            height: 400px !important;
            border-radius: 16px;
        }

        .scan-status {
            text-align: center;
            margin-bottom: 15px;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .status-ready {
            background: rgba(39, 174, 96, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .status-scanning {
            background: rgba(243, 156, 18, 0.2);
            color: var(--warning);
            border: 1px solid var(--warning);
            animation: pulse 2s infinite;
        }

        .status-error {
            background: rgba(231, 76, 60, 0.2);
            color: var(--error);
            border: 1px solid var(--error);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .btn {
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(233, 69, 96, 0.4);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--border);
            transform: translateY(-1px);
        }

        .btn-accent {
            background: linear-gradient(135deg, #4ECDC4 0%, #45B7D1 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.3);
        }

        .btn-accent:hover:not(:disabled) {
            background: linear-gradient(135deg, #45B7D1 0%, #4ECDC4 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(78, 205, 196, 0.4);
        }

        /* 手動輸入區域 */
        .manual-input {
            background: var(--primary-light);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .manual-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text);
        }

        .input-group {
            display: flex;
            gap: 12px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .manual-input input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1rem;
            background: #ffffff !important;
            border: 2px solid #ddd !important;
            border-radius: 12px;
            color: #333333 !important;
            font-family: 'Noto Sans TC', 'JetBrains Mono', monospace;
            letter-spacing: 1px;
            position: relative;
            z-index: 10;
            pointer-events: auto;
        }

        .manual-input input:focus {
            outline: none;
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.2);
        }

        .manual-input input::placeholder {
            color: #999999 !important;
            text-transform: none;
            letter-spacing: normal;
        }

        /* ===== Autocomplete 下拉選單 ===== */
        .autocomplete-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #ffffff;
            border: 2px solid var(--accent);
            border-top: none;
            border-radius: 0 0 12px 12px;
            max-height: 280px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        .autocomplete-dropdown.show {
            display: block;
            animation: dropdownSlide 0.2s ease;
        }

        @keyframes dropdownSlide {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .autocomplete-item {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            transition: background 0.15s ease;
            color: #333;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 1rem;
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-item:hover,
        .autocomplete-item.active {
            background: #fff0f3;
        }

        .autocomplete-item .name {
            font-weight: 600;
            font-size: 1.05rem;
            color: #1a1a2e;
        }

        .autocomplete-item .name .highlight {
            color: var(--accent);
            background: rgba(233, 69, 96, 0.1);
            border-radius: 3px;
            padding: 0 2px;
        }

        .autocomplete-item .id-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #888;
            background: #f0f0f0;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 1px;
        }

        .autocomplete-dropdown::-webkit-scrollbar {
            width: 6px;
        }

        .autocomplete-dropdown::-webkit-scrollbar-track {
            background: transparent;
        }

        .autocomplete-dropdown::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .autocomplete-count {
            padding: 8px 20px;
            font-size: 0.8rem;
            color: #999;
            text-align: center;
            border-bottom: 1px solid #eee;
            background: #fafafa;
        }

        /* ===== 快捷功能按鈕區域 ===== */
        .quick-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .quick-actions .btn {
            flex: 1;
            min-width: 140px;
            font-size: 0.9rem;
            width: 100%;
            margin-bottom: 12px;
            justify-content: center;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 結果顯示 */
        .result {
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: none;
            animation: slideInUp 0.5s ease;
            border-left: 4px solid;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result.success {
            background: rgba(39, 174, 96, 0.15);
            border-color: var(--success);
            color: var(--success);
            border-width: 3px;
            box-shadow: 0 4px 20px rgba(39, 174, 96, 0.3);
        }

        .result.error {
            background: rgba(231, 76, 60, 0.1);
            border-color: var(--error);
            color: var(--error);
        }

        .result.duplicate {
            background: rgba(243, 156, 18, 0.1);
            border-color: var(--warning);
            color: var(--warning);
        }

        .result-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .result-detail {
            font-size: 1rem;
            line-height: 1.6;
            font-weight: 400;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 響應式設計 */
        @media (max-width: 1200px) {
            .main-container {
                grid-template-columns: 1fr;
                padding: 20px;
            }
        }

        @media (max-width: 768px) {
            .scan-title { font-size: 2rem; }
            .controls { flex-direction: column; }
            .btn { width: 100%; }
            .input-group { flex-direction: column; }
            .quick-actions { flex-direction: column; }
            .quick-actions .btn { width: 100%; }
        }

        .sound-wave {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .sound-wave.active {
            display: block;
            animation: soundPulse 0.5s ease;
        }

        @keyframes soundPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }
    </style>
</head>

            {id:"P009",name:"劉宏洋"},{id:"P010",name:"邵靛程"},{id:"P011",name:"林仕傑"},
            {id:"Q001",name:"王煦棋"},{id:"Q002",name:"蔡鐘慶"},{id:"Q003",name:"陳蕙君"},{id:"Q004",name:"許獻進"},
            {id:"Q005",name:"張少騰"},{id:"Q006",name:"楊薪頻"},{id:"Q007",name:"何家瑋"},{id:"Q008",name:"王士維"},
            {id:"Q009",name:"曾國祐"},{id:"Q010",name:"曾國祐律師夫人"},
            {id:"R001",name:"錢世傑"},{id:"R002",name:"謝偉廉"},{id:"R003",name:"林器弘"},{id:"R004",name:"高敬棠"},
            {id:"R005",name:"周致玄"},{id:"R006",name:"鄒熙華"},{id:"R007",name:"黃書炫"},{id:"R008",name:"王睿騰"},
            {id:"R009",name:"劉人睿"},{id:"R010",name:"鄧景丰"},{id:"R011",name:"謝偉丞"},
            {id:"S001",name:"劉文珍"},{id:"S002",name:"林慧貞"},{id:"S003",name:"蕭惠文"},{id:"S004",name:"鄭婷文"},
            {id:"S005",name:"余文玲"},{id:"S006",name:"林淑婉"},{id:"S007",name:"侯淑津"},{id:"S008",name:"紀惠玲"},
            {id:"S009",name:"江秀敏"},{id:"S010",name:"陳育萱"},{id:"S011",name:"劉岳樺"}
        ];

        // ===== Autocomplete 邏輯 =====
        const input = document.getElementById('manualInput');
        const dropdown = document.getElementById('autocompleteDropdown');
        let activeIndex = -1; // 鍵盤選取索引
        let filteredList = [];

        // 判斷是否為中文字元
        function isChinese(str) {
            return /[\u4e00-\u9fff]/.test(str);
        }

        // 輸入事件 → 篩選並顯示建議
        input.addEventListener('input', function() {
            const val = this.value.trim();
            activeIndex = -1;

            // 空值或純英數（編號模式）→ 隱藏下拉
            if (!val || !isChinese(val)) {
                hideDropdown();
                return;
            }

            // 中文模式 → 過濾名單
            filteredList = GUEST_LIST.filter(g => g.name.includes(val));

            if (filteredList.length === 0) {
                dropdown.innerHTML = '<div class="autocomplete-count">查無符合的賓客</div>';
                dropdown.classList.add('show');
                return;
            }

            renderDropdown(val);
        });

        function renderDropdown(keyword) {
            let html = `<div class="autocomplete-count">找到 ${filteredList.length} 位賓客</div>`;

            filteredList.forEach((guest, idx) => {
                // 高亮匹配文字
                const highlightedName = guest.name.replace(
                    keyword,
                    `<span class="highlight">${keyword}</span>`
                );
                html += `
                    <div class="autocomplete-item" data-index="${idx}"
                         onmousedown="selectGuest(${idx})">
                        <span class="name">${highlightedName}</span>
                        <span class="id-badge">${guest.id}</span>
                    </div>
                `;
            });

            dropdown.innerHTML = html;
            dropdown.classList.add('show');
        }

        function selectGuest(idx) {
            const guest = filteredList[idx];
            if (!guest) return;
            input.value = guest.name;
            hideDropdown();
            // 自動觸發報到
            manualCheckIn();
        }

        function hideDropdown() {
            dropdown.classList.remove('show');
            dropdown.innerHTML = '';
            activeIndex = -1;
        }

        // 鍵盤上下選取 + Enter 確認
        input.addEventListener('keydown', function(e) {
            if (!dropdown.classList.contains('show') || filteredList.length === 0) return;

            const items = dropdown.querySelectorAll('.autocomplete-item');

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                activeIndex = Math.min(activeIndex + 1, items.length - 1);
                updateActiveItem(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                activeIndex = Math.max(activeIndex - 1, 0);
                updateActiveItem(items);
            } else if (e.key === 'Enter' && activeIndex >= 0) {
                e.preventDefault();
                selectGuest(activeIndex);
            }
        });

        function updateActiveItem(items) {
            items.forEach(item => item.classList.remove('active'));
            if (items[activeIndex]) {
                items[activeIndex].classList.add('active');
                items[activeIndex].scrollIntoView({ block: 'nearest' });
            }
        }

        // 點擊外部關閉
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.input-wrapper')) {
                hideDropdown();
            }
        });

        // ===== 設定值 =====
        const WEBHOOK_URL = 'https://mjib007.zeabur.app/webhook/checkin';
        
        let html5QrCode;
        let isScanning = false;

        function updateStatus(type, message) {
            const indicator = document.getElementById('statusIndicator');
            indicator.className = `status-indicator status-${type}`;
            const icons = { ready: '⚪', scanning: '🔴', processing: '🟡', success: '🟢', error: '🔴' };
            indicator.innerHTML = `<span>${icons[type] || '⚪'}</span><span>${message}</span>`;
        }

        function startScanning() {
            const config = { fps: 10, qrbox: { width: 350, height: 350 }, aspectRatio: 1.0 };
            html5QrCode = new Html5Qrcode("qr-reader");
            document.getElementById('startBtn').disabled = true;
            updateStatus('processing', '正在啟動相機...');
            
            html5QrCode.start(
                { facingMode: "environment" }, config, onScanSuccess, onScanError
            ).then(() => {
                isScanning = true;
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'inline-flex';
                updateStatus('scanning', '掃描中... 請將 QR Code 對準相機');
            }).catch(err => {
                document.getElementById('startBtn').disabled = false;
                updateStatus('error', '相機啟動失敗');
                showResult('error', '無法開啟相機', '請確認已授權相機權限並重新整理頁面');
                console.error('相機錯誤:', err);
            });
        }

        function stopScanning() {
            if (html5QrCode && isScanning) {
                document.getElementById('stopBtn').disabled = true;
                html5QrCode.stop().then(() => {
                    isScanning = false;
                    document.getElementById('startBtn').style.display = 'inline-flex';
                    document.getElementById('stopBtn').style.display = 'none';
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('stopBtn').disabled = false;
                    updateStatus('ready', '系統就緒');
                }).catch(err => {
                    document.getElementById('stopBtn').disabled = false;
                    console.error('停止掃描錯誤:', err);
                });
            }
        }

        let lastScanTime = 0;
        const SCAN_COOLDOWN = 2000;

        async function onScanSuccess(decodedText) {
            const now = Date.now();
            if (now - lastScanTime < SCAN_COOLDOWN) return;
            lastScanTime = now;

            if (html5QrCode && isScanning) await html5QrCode.pause();
            updateStatus('processing', '處理 QR Code...');

            let attendeeId = decodedText.trim().toUpperCase();
            
            if (!validateAttendeeId(attendeeId)) {
                try {
                    const qrData = JSON.parse(decodedText);
                    attendeeId = qrData.編號 || qrData.id || qrData.attendee_id;
                } catch (e) {
                    showResult('error', '無效的 QR Code', '請確認 QR Code 格式正確');
                    resumeScanning();
                    return;
                }
            }
            
            await processCheckIn(attendeeId);
            resumeScanning();
        }

        function resumeScanning() {
            setTimeout(() => {
                if (html5QrCode && isScanning) {
                    html5QrCode.resume();
                    updateStatus('scanning', '掃描中... 請將 QR Code 對準相機');
                }
            }, 3000);
        }

        function onScanError(errorMessage) {
            if (errorMessage && !errorMessage.includes('No QR code found')) {
                console.log('掃描訊息:', errorMessage);
            }
        }

        function validateAttendeeId(id) {
            return id.length >= 2;
        }

        async function manualCheckIn() {
            const inputValue = document.getElementById('manualInput').value.trim();
            hideDropdown();

            if (!inputValue || inputValue.length < 2) {
                showResult('error', '輸入不足', '請輸入至少 2 個字元');
                return;
            }

            // 判斷是中文姓名還是編號
            let keyword = inputValue;
            if (!isChinese(inputValue)) {
                keyword = inputValue.toUpperCase();
            }

            document.getElementById('manualBtn').disabled = true;
            updateStatus('processing', '處理手動輸入...');

            await processCheckIn(keyword);

            document.getElementById('manualInput').value = '';
            document.getElementById('manualBtn').disabled = false;
            updateStatus('ready', '系統就緒');
        }

        async function processCheckIn(attendeeId) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        keyword: attendeeId,
                        timestamp: new Date().toISOString()
                    }),
                    signal: AbortSignal.timeout(10000)
                });

                document.getElementById('loading').style.display = 'none';

                if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);

                const result = await response.json();
                handleCheckInResult(result);

            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                let errorMessage = '系統暫時無法使用';
                if (error.name === 'TimeoutError') errorMessage = '請求超時，請重試';
                else if (error.message.includes('Failed to fetch')) errorMessage = '網路連線錯誤';
                showResult('error', '❌ 系統錯誤', errorMessage);
                playSound('error');
                updateStatus('error', '處理失敗');
            }
        }

        function handleCheckInResult(result) {
            if (result.status === 'success') {
                showResult('success', '✅ 報到成功！', 
                    `編號：${result.編號}\n姓名：${result.姓名}\n職稱：${result.職稱 || '未提供'}\n桌次：${result.桌次 || '未指定'}\n單位：${result.單位}\n時間：${result.報到時間}`
                );
                playSound('success');
                updateStatus('success', '報到成功');
            } else if (result.status === 'duplicate') {
                showResult('duplicate', '⚠️ 重複報到', 
                    `編號：${result.編號}\n姓名：${result.姓名}\n職稱：${result.職稱 || '未提供'}\n桌次：${result.桌次 || '未指定'}\n單位：${result.單位}\n首次報到：${result.報到時間}`
                );
                playSound('duplicate');
                updateStatus('ready', '重複報到');
            } else {
                showResult('error', '❌ 報到失敗', result.message || '查無此編號，請確認是否正確');
                playSound('error');
                updateStatus('error', '報到失敗');
            }
        }

        function showResult(type, title, detail) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result ${type}`;
            resultDiv.innerHTML = `
                <div class="result-title">${title}</div>
                <div class="result-detail">${detail.replace(/\n/g, '<br>')}</div>
            `;
            resultDiv.style.display = 'block';

            if (type === 'success' || type === 'duplicate') {
                const closeBtn = document.createElement('button');
                closeBtn.innerHTML = '✕ 關閉';
                closeBtn.style.cssText = `
                    position: absolute; top: 10px; right: 15px;
                    background: rgba(0,0,0,0.1); border: none;
                    padding: 5px 10px; border-radius: 15px;
                    cursor: pointer; font-size: 0.8rem; color: inherit;
                `;
                closeBtn.onclick = () => { resultDiv.style.display = 'none'; };
                resultDiv.style.position = 'relative';
                resultDiv.appendChild(closeBtn);

                setTimeout(() => {
                    if (resultDiv.style.display !== 'none') resultDiv.style.display = 'none';
                }, 15000);
            }
        }

        function playSound(type) {
            const soundWave = document.getElementById('soundWave');
            soundWave.classList.add('active');
            setTimeout(() => soundWave.classList.remove('active'), 500);

            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                const frequencies = { success: [800, 1000, 1200], duplicate: [600, 500], error: [300, 200, 300] };
                const freq = frequencies[type] || [400];
                oscillator.frequency.setValueAtTime(freq[0], audioContext.currentTime);
                if (freq.length > 1) {
                    freq.forEach((f, i) => {
                        oscillator.frequency.setValueAtTime(f, audioContext.currentTime + (i * 0.1));
                    });
                }
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.5);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.5);
            } catch (error) {
                console.log('無法播放音效:', error);
            }
        }

        function openMCInterface() {
            window.open('./mc-interface.html', '_blank', 'width=1200,height=800');
        }

        function openTableInterface() {
            window.open('./mc-stats.html', '_blank', 'width=1400,height=900');
        }

        function openGuestInterface() {
            window.open('https://mjib007.github.io/homepage/mc-guest.html', '_blank', 'width=400,height=800');
        }

        // 鍵盤快捷鍵（排除 autocomplete 的 Enter）
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && document.activeElement === input) {
                // 如果 autocomplete 沒有選中項目，才觸發報到
                if (activeIndex < 0 && !dropdown.classList.contains('show')) {
                    manualCheckIn();
                }
            }
            if (event.key === 'Escape') {
                if (dropdown.classList.contains('show')) {
                    hideDropdown();
                } else if (isScanning) {
                    stopScanning();
                }
            }
            if (event.ctrlKey && event.key === ' ') {
                event.preventDefault();
                isScanning ? stopScanning() : startScanning();
            }
        });

        window.addEventListener('load', () => {
            updateStatus('ready', '系統就緒');
            console.log('活動報到系統已啟動');
        });

        window.addEventListener('beforeunload', () => {
            if (html5QrCode && isScanning) html5QrCode.stop();
        });
    </script>
